<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="8" fill="#111827"/>
  <!--
    Wind icon de Lucide, reescalado de 24x24 a ~22x22 centrado en 32x32.
    Lucide Wind paths originales escalados (factor ~0.9) y trasladados (+4, +5).
    stroke-linecap="round" stroke-linejoin="round" como en Lucide.
  -->
  <g transform="translate(5, 5) scale(0.92)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- línea superior: va a la derecha y curva (arco a la derecha-arriba) -->
    <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/>
    <!-- línea del medio -->
    <path d="M9.6 4.6A2 2 0 1 1 11 8H2"/>
    <!-- línea inferior: curva hacia abajo -->
    <path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
  </g>
  <!-- Punto azul de marca -->
  <circle cx="26" cy="26" r="3" fill="#3B82F6"/>
</svg>
